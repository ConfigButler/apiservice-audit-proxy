name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  PROJECT_DIR: external-prototype/audit-pass-through-apiserver
  IMAGE_NAME: audit-pass-through-apiserver

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: external-prototype/audit-pass-through-apiserver
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: external-prototype/audit-pass-through-apiserver/go.mod
          cache-dependency-path: external-prototype/audit-pass-through-apiserver/go.sum

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release artifacts
        run: task dist

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: ./external-prototype/audit-pass-through-apiserver
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/audit-pass-through-apiserver:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/audit-pass-through-apiserver:latest

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            external-prototype/audit-pass-through-apiserver/dist/install.yaml
            external-prototype/audit-pass-through-apiserver/dist/*.tgz
            external-prototype/audit-pass-through-apiserver/dist/checksums.txt

