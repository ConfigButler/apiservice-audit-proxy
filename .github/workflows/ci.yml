name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CI_IMAGE_NAME: audit-pass-through-apiserver-ci
  DEV_IMAGE_NAME: audit-pass-through-apiserver-devcontainer
  REGISTRY: ghcr.io
  IMAGE_NAME: audit-pass-through-apiserver

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-devcontainer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dev container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./.devcontainer/Dockerfile
          target: dev
          push: false
          load: true
          tags: ${{ env.DEV_IMAGE_NAME }}:test
          cache-from: type=gha,scope=audit-pass-through-apiserver-devcontainer
          cache-to: type=gha,mode=max,scope=audit-pass-through-apiserver-devcontainer

      - name: Validate dev container tools
        run: |
          docker run --rm ${{ env.DEV_IMAGE_NAME }}:test bash -lc '
            set -e
            go version
            helm version
            golangci-lint version
            flux --version
            k3d version
            tilt version
            task --version
            bash -ic "complete -p task >/dev/null"
          '

  validate:
    runs-on: ubuntu-latest
    needs: validate-devcontainer
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build CI container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./.devcontainer/Dockerfile
          target: ci
          push: false
          load: true
          tags: ${{ env.CI_IMAGE_NAME }}:test
          cache-from: type=gha,scope=audit-pass-through-apiserver-ci
          cache-to: type=gha,mode=max,scope=audit-pass-through-apiserver-ci

      - name: Validate CI container tools
        run: |
          docker run --rm ${{ env.CI_IMAGE_NAME }}:test bash -lc '
            set -e
            go version
            helm version
            golangci-lint version
            task --version
          '

      - name: Run project checks
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            ${{ env.CI_IMAGE_NAME }}:test \
            bash -lc '
              set -e
              git config --global --add safe.directory /workspace
              task fmt:check
              task lint
              task test
              task build
              task helm:lint
              task dist
            '

      - name: Build container
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha,scope=audit-pass-through-apiserver-image
          cache-to: type=gha,mode=max,scope=audit-pass-through-apiserver-image

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: audit-pass-through-dist
          path: dist
          if-no-files-found: error

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.35.3

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.4

      - name: Install Task, Flux, and k3d
        run: |
          curl -fsSL https://taskfile.dev/install.sh | sudo sh -s -- -d -b /usr/local/bin
          curl -fsSL https://fluxcd.io/install.sh | sudo bash
          curl -fsSL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | sudo bash

      - name: Verify Docker
        run: docker info

      - name: Run standalone k3d smoke flow
        run: task e2e:test-smoke

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          kubectl config current-context || true
          kubectl get pods -A || true
          kubectl get apiservice -A || true
          kubectl get certificaterequests,certificates,issuers -A || true

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - validate
      - e2e-smoke
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: audit-pass-through-dist
          path: dist

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=audit-pass-through-apiserver-release
          cache-to: type=gha,mode=max,scope=audit-pass-through-apiserver-release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/install.yaml
            dist/*.tgz
            dist/checksums.txt
