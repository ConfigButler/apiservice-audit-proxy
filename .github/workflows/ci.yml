name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: audit-pass-through-apiserver
  CI_IMAGE_NAME: audit-pass-through-apiserver-ci
  DEV_IMAGE_NAME: audit-pass-through-apiserver-devcontainer
  CI_CACHE_SCOPE: audit-pass-through-apiserver-ci
  DEV_CACHE_SCOPE: audit-pass-through-apiserver-devcontainer
  IMAGE_CACHE_SCOPE: audit-pass-through-apiserver-image
  RELEASE_CACHE_SCOPE: audit-pass-through-apiserver-release
  KUBECTL_VERSION: v1.35.3
  HELM_VERSION: v4.1.4
  K3D_VERSION: v5.8.3
  FLUX_VERSION: 2.8.5
  TASK_VERSION: v3.49.1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ci-container:
    name: Build CI Base Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build CI container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: ci
          push: false
          load: true
          tags: ${{ env.CI_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.CI_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CI_CACHE_SCOPE }}

      - name: Validate CI container tools
        run: |
          docker run --rm ${{ env.CI_IMAGE_NAME }}:${{ github.sha }} bash -lc '
            set -euo pipefail
            go version
            kubectl version --client
            kustomize version
            helm version
            golangci-lint version
            controller-gen --version
            setup-envtest --help >/dev/null
            task --version
          '

  validate-devcontainer:
    name: Validate Dev Container
    runs-on: ubuntu-latest
    needs: build-ci-container
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dev container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: dev
          push: false
          load: true
          tags: ${{ env.DEV_IMAGE_NAME }}:test
          cache-from: |
            type=gha,scope=${{ env.CI_CACHE_SCOPE }}
            type=gha,scope=${{ env.DEV_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.DEV_CACHE_SCOPE }}

      - name: Validate dev container tools
        run: |
          docker run --rm ${{ env.DEV_IMAGE_NAME }}:test bash -lc '
            set -euo pipefail
            go version
            kubectl version --client
            kustomize version
            helm version
            golangci-lint version
            flux --version
            k3d version
            tilt version
            task --version
            bash -ic "complete -p task >/dev/null"
          '

  lint:
    name: Lint Go Code
    runs-on: ubuntu-latest
    needs: build-ci-container
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build CI container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: ci
          push: false
          load: true
          tags: ${{ env.CI_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.CI_CACHE_SCOPE }}

      - name: Check formatting and run golangci-lint
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            ${{ env.CI_IMAGE_NAME }}:${{ github.sha }} \
            bash -lc '
              set -euo pipefail
              git config --global --add safe.directory /workspace
              task fmt:check
              task lint
            '

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-ci-container
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build CI container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: ci
          push: false
          load: true
          tags: ${{ env.CI_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.CI_CACHE_SCOPE }}

      - name: Run unit tests
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            ${{ env.CI_IMAGE_NAME }}:${{ github.sha }} \
            bash -lc '
              set -euo pipefail
              git config --global --add safe.directory /workspace
              task test
            '

  build:
    name: Build Go Binary
    runs-on: ubuntu-latest
    needs: build-ci-container
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build CI container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: ci
          push: false
          load: true
          tags: ${{ env.CI_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.CI_CACHE_SCOPE }}

      - name: Build server binary
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            ${{ env.CI_IMAGE_NAME }}:${{ github.sha }} \
            bash -lc '
              set -euo pipefail
              git config --global --add safe.directory /workspace
              task build
            '

  lint-helm:
    name: Lint Helm Chart And Build Release Bundle
    runs-on: ubuntu-latest
    needs: build-ci-container
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build CI container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: ci
          push: false
          load: true
          tags: ${{ env.CI_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.CI_CACHE_SCOPE }}

      - name: Build release bundle
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            ${{ env.CI_IMAGE_NAME }}:${{ github.sha }} \
            bash -lc '
              set -euo pipefail
              git config --global --add safe.directory /workspace
              task helm:lint
              task dist
            '

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: dist
          if-no-files-found: error

  docker-build:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - build
      - lint-helm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build application image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha,scope=${{ env.IMAGE_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_CACHE_SCOPE }}

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - build
      - lint-helm
      - docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install kubectl
        run: |
          curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl
          sudo mv /tmp/kubectl /usr/local/bin/kubectl

      - name: Install Helm
        run: |
          curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" \
            | tar -xzO linux-amd64/helm > /tmp/helm
          chmod +x /tmp/helm
          sudo mv /tmp/helm /usr/local/bin/helm

      - name: Install Task
        run: |
          curl -fsSL "https://github.com/go-task/task/releases/download/${TASK_VERSION}/task_linux_amd64.tar.gz" \
            | tar -xzO task > /tmp/task
          chmod +x /tmp/task
          sudo mv /tmp/task /usr/local/bin/task

      - name: Install Flux
        run: |
          curl -fsSL "https://github.com/fluxcd/flux2/releases/download/v${FLUX_VERSION}/flux_${FLUX_VERSION}_linux_amd64.tar.gz" \
            | tar -xzO flux > /tmp/flux
          chmod +x /tmp/flux
          sudo mv /tmp/flux /usr/local/bin/flux

      - name: Install k3d
        run: |
          curl -fsSL -o /tmp/k3d "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64"
          chmod +x /tmp/k3d
          sudo mv /tmp/k3d /usr/local/bin/k3d

      - name: Verify Docker
        run: docker info

      - name: Run standalone k3d smoke flow
        run: task e2e:test-smoke

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          kubectl config current-context || true
          kubectl get pods -A || true
          kubectl get apiservice -A || true
          kubectl get certificaterequests,certificates,issuers -A || true

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - e2e-smoke
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download release bundle artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-bundle
          path: .

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=${{ env.RELEASE_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.RELEASE_CACHE_SCOPE }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/install.yaml
            dist/*.tgz
            dist/checksums.txt
