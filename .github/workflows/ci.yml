name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: external-prototype/audit-pass-through-apiserver
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: external-prototype/audit-pass-through-apiserver/go.mod
          cache-dependency-path: external-prototype/audit-pass-through-apiserver/go.sum

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: external-prototype/audit-pass-through-apiserver
          args: --timeout=5m

      - name: Run tests
        run: task test

      - name: Build binary
        run: task build

      - name: Build container
        run: task docker-build

      - name: Helm lint
        run: task helm:lint

      - name: Build dist artifacts
        run: task dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-pass-through-dist
          path: external-prototype/audit-pass-through-apiserver/dist
          if-no-files-found: error

