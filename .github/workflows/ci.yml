name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: configbutler/apiservice-audit-proxy
  CI_IMAGE_NAME: configbutler/apiservice-audit-proxy-ci
  DEV_IMAGE_NAME: apiservice-audit-proxy-devcontainer
  CHART_REGISTRY: ghcr.io/configbutler/charts
  CI_CACHE_SCOPE: apiservice-audit-proxy-ci
  DEV_CACHE_SCOPE: apiservice-audit-proxy-devcontainer
  IMAGE_CACHE_SCOPE: apiservice-audit-proxy-image

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ci-container:
    name: Build CI Base Container
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set image name
        id: image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.CI_IMAGE_NAME }}:${{ github.sha }}"
          echo "name=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Build and push CI container
        uses: configbutler/.github/actions/docker-build@main
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          file: .devcontainer/Dockerfile
          target: ci
          push: 'true'
          load: 'true'
          tags: ${{ steps.image.outputs.name }}
          cache-scope: ${{ env.CI_CACHE_SCOPE }}

      - name: Validate CI container tools
        run: |
          docker run --rm ${{ steps.image.outputs.name }} bash -lc '
            set -euo pipefail
            go version
            kubectl version --client
            kustomize version
            helm version
            golangci-lint version
            controller-gen --version
            setup-envtest version
            task --version
          '

  validate-devcontainer:
    name: Validate Dev Container
    runs-on: ubuntu-latest
    needs: build-ci-container
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build dev container
        uses: configbutler/.github/actions/docker-build@main
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          file: .devcontainer/Dockerfile
          target: dev
          load: 'true'
          tags: ${{ env.DEV_IMAGE_NAME }}:test
          cache-scope: ${{ env.DEV_CACHE_SCOPE }}
          cache-from-extra: type=gha,scope=${{ env.CI_CACHE_SCOPE }}

      - name: Validate dev container tools
        run: |
          docker run --rm ${{ env.DEV_IMAGE_NAME }}:test bash -lc '
            set -euo pipefail
            go version
            kubectl version --client
            kustomize version
            helm version
            golangci-lint version
            flux --version
            k3d version
            tilt version
            task --version
            bash -ic "complete -p task >/dev/null"
          '

  lint:
    name: Lint Go Code
    runs-on: ubuntu-latest
    needs: build-ci-container
    container:
      image: ${{ needs.build-ci-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Check formatting
        run: task fmt:check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-mode: none
          skip-cache: false
          skip-save-cache: false
          only-new-issues: ${{ github.event_name == 'pull_request' }}
          args: --timeout=5m --concurrency=4

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-ci-container
    container:
      image: ${{ needs.build-ci-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Run unit tests
        run: task test

  build:
    name: Build Go Binary
    runs-on: ubuntu-latest
    needs: build-ci-container
    container:
      image: ${{ needs.build-ci-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Build server binary
        run: task build

  lint-helm:
    name: Lint Helm Chart And Build Release Bundle
    runs-on: ubuntu-latest
    needs: build-ci-container
    container:
      image: ${{ needs.build-ci-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Lint Helm chart and build release bundle
        run: |
          task helm:lint
          task dist

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: dist
          if-no-files-found: error

  docker-build:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs: build-ci-container
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set image name
        id: image
        run: |
          echo "name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push application image
        uses: configbutler/.github/actions/docker-build@main
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          platforms: linux/amd64
          push: 'true'
          tags: ${{ steps.image.outputs.name }}
          cache-scope: ${{ env.IMAGE_CACHE_SCOPE }}

  e2e-taskfile:
    name: E2E Taskfile Validation
    runs-on: ubuntu-latest
    needs: build-ci-container
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI image
        run: docker pull ${{ needs.build-ci-container.outputs.image }}

      - name: Run Taskfile validation tests
        run: |
          docker run --rm \
            --network host \
            -v "${GITHUB_WORKSPACE}:/workspaces/apiservice-audit-proxy" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w /workspaces/apiservice-audit-proxy \
            ${{ needs.build-ci-container.outputs.image }} \
            bash -lc "
              git config --global --add safe.directory /workspaces/apiservice-audit-proxy
              task e2e:test-taskfile
            "

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs:
      - build-ci-container
      - docker-build
    env:
      E2E_PROXY_IMAGE: ${{ needs.docker-build.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI and application images
        run: |
          docker pull ${{ needs.build-ci-container.outputs.image }}
          docker pull ${{ needs.docker-build.outputs.image }}

      - name: Run standalone k3d smoke flow
        run: |
          mkdir -p /tmp/e2e-kube
          docker run --rm \
            --network host \
            -v "${GITHUB_WORKSPACE}:/workspaces/apiservice-audit-proxy" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /tmp/e2e-kube:/root/.kube \
            -w /workspaces/apiservice-audit-proxy \
            -e E2E_PROXY_IMAGE \
            ${{ needs.build-ci-container.outputs.image }} \
            bash -lc "
              git config --global --add safe.directory /workspaces/apiservice-audit-proxy
              task e2e:test-smoke-full
            "

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          docker run --rm \
            --network host \
            -v /tmp/e2e-kube:/root/.kube \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ${{ needs.build-ci-container.outputs.image }} \
            bash -lc "
              kubectl config current-context || true
              kubectl get pods -A || true
              kubectl get apiservice -A || true
              kubectl get certificaterequests,certificates,issuers -A || true
            " || true

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - lint
      - test
      - build
      - lint-helm
      - docker-build
      - e2e-smoke
      - e2e-taskfile
      - validate-devcontainer
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build multi-arch image and publish manifest via shared reusable workflow
  publish:
    name: Publish Multi-Arch Image
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: configbutler/.github/.github/workflows/multi-arch-publish.yml@main
    with:
      image-name: configbutler/apiservice-audit-proxy
      version: ${{ needs.release-please.outputs.version }}
      tag-name: ${{ needs.release-please.outputs.tag_name }}
      release-notes: |
        ## Installation
        ### Helm Chart
        ```bash
        helm install apiservice-audit-proxy oci://ghcr.io/configbutler/charts/apiservice-audit-proxy --version ${{ needs.release-please.outputs.version }}
        ```
        ## Docker Image
        ```bash
        docker pull ghcr.io/configbutler/apiservice-audit-proxy:${{ needs.release-please.outputs.version }}
        docker pull ghcr.io/configbutler/apiservice-audit-proxy:latest
        ```
        **Platforms:** linux/amd64, linux/arm64
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  publish-helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [build-ci-container, e2e-smoke, release-please]
    if: needs.release-please.outputs.release_created == 'true'
    container:
      image: ${{ needs.build-ci-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Download tested release bundle artifact
        uses: actions/download-artifact@v7
        with:
          name: release-bundle
          path: dist

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to GHCR
        run: |
          helm push dist/apiservice-audit-proxy-*.tgz oci://${{ env.CHART_REGISTRY }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/apiservice-audit-proxy-*.tgz
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
