name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: configbutler/apiservice-audit-proxy
  CI_IMAGE_NAME: configbutler/apiservice-audit-proxy-ci
  DEV_IMAGE_NAME: apiservice-audit-proxy-devcontainer
  CHART_REGISTRY: ghcr.io/configbutler/charts
  CI_CACHE_SCOPE: apiservice-audit-proxy-ci
  DEV_CACHE_SCOPE: apiservice-audit-proxy-devcontainer
  IMAGE_CACHE_SCOPE: apiservice-audit-proxy-image
  KUBECTL_VERSION: v1.35.3
  HELM_VERSION: v4.1.4
  K3D_VERSION: v5.8.3
  FLUX_VERSION: 2.8.5
  TASK_VERSION: v3.49.1

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ci-container:
    name: Build CI Base Container
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.CI_IMAGE_NAME }}:${{ github.sha }}"
          echo "name=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Build and push CI container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: ci
          push: true
          load: true
          tags: ${{ steps.image.outputs.name }}
          cache-from: type=gha,scope=${{ env.CI_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CI_CACHE_SCOPE }}

      - name: Validate CI container tools
        run: |
          docker run --rm ${{ steps.image.outputs.name }} bash -lc '
            set -euo pipefail
            go version
            kubectl version --client
            kustomize version
            helm version
            golangci-lint version
            controller-gen --version
            setup-envtest version
            task --version
          '

  validate-devcontainer:
    name: Validate Dev Container
    runs-on: ubuntu-latest
    needs: build-ci-container
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dev container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: dev
          push: false
          load: true
          tags: ${{ env.DEV_IMAGE_NAME }}:test
          cache-from: |
            type=gha,scope=${{ env.CI_CACHE_SCOPE }}
            type=gha,scope=${{ env.DEV_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.DEV_CACHE_SCOPE }}

      - name: Validate dev container tools
        run: |
          docker run --rm ${{ env.DEV_IMAGE_NAME }}:test bash -lc '
            set -euo pipefail
            go version
            kubectl version --client
            kustomize version
            helm version
            golangci-lint version
            flux --version
            k3d version
            tilt version
            task --version
            bash -ic "complete -p task >/dev/null"
          '

  lint:
    name: Lint Go Code
    runs-on: ubuntu-latest
    needs: build-ci-container
    container:
      image: ${{ needs.build-ci-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Check formatting
        run: task fmt:check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-mode: none
          skip-cache: false
          skip-save-cache: false
          only-new-issues: ${{ github.event_name == 'pull_request' }}
          args: --timeout=5m --concurrency=4

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-ci-container
    container:
      image: ${{ needs.build-ci-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Run unit tests
        run: task test

  build:
    name: Build Go Binary
    runs-on: ubuntu-latest
    needs: build-ci-container
    container:
      image: ${{ needs.build-ci-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Build server binary
        run: task build

  lint-helm:
    name: Lint Helm Chart And Build Release Bundle
    runs-on: ubuntu-latest
    needs: build-ci-container
    container:
      image: ${{ needs.build-ci-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Lint Helm chart and build release bundle
        run: |
          task helm:lint
          task dist

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: dist
          if-no-files-found: error

  docker-build:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs: build-ci-container
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build application image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha,scope=${{ env.IMAGE_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_CACHE_SCOPE }}

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - build
      - lint-helm
      - docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install kubectl
        run: |
          curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl
          sudo mv /tmp/kubectl /usr/local/bin/kubectl

      - name: Install Helm
        run: |
          curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" \
            | tar -xzO linux-amd64/helm > /tmp/helm
          chmod +x /tmp/helm
          sudo mv /tmp/helm /usr/local/bin/helm

      - name: Install Task
        run: |
          curl -fsSL "https://github.com/go-task/task/releases/download/${TASK_VERSION}/task_linux_amd64.tar.gz" \
            | tar -xzO task > /tmp/task
          chmod +x /tmp/task
          sudo mv /tmp/task /usr/local/bin/task

      - name: Install Flux
        run: |
          curl -fsSL "https://github.com/fluxcd/flux2/releases/download/v${FLUX_VERSION}/flux_${FLUX_VERSION}_linux_amd64.tar.gz" \
            | tar -xzO flux > /tmp/flux
          chmod +x /tmp/flux
          sudo mv /tmp/flux /usr/local/bin/flux

      - name: Install k3d
        run: |
          curl -fsSL -o /tmp/k3d "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64"
          chmod +x /tmp/k3d
          sudo mv /tmp/k3d /usr/local/bin/k3d

      - name: Verify Docker
        run: docker info

      - name: Run standalone k3d smoke flow
        run: task e2e:test-smoke

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          kubectl config current-context || true
          kubectl get pods -A || true
          kubectl get apiservice -A || true
          kubectl get certificaterequests,certificates,issuers -A || true

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - lint
      - test
      - build
      - lint-helm
      - docker-build
      - e2e-smoke
      - validate-devcontainer
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build each platform image in parallel and upload its digest
  publish:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runs_on }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runs_on: ubuntu-latest
          - platform: linux/arm64
            runs_on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image by digest
        id: build
        uses: ./.github/actions/docker-build
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
          cache-scope: build-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge platform digests into a multi-arch manifest list and publish release notes
  publish-manifest:
    name: Publish Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Update release notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          append_body: true
          body: |
            ## Installation
            ### Helm Chart
            ```bash
            helm install apiservice-audit-proxy oci://${{ env.CHART_REGISTRY }}/apiservice-audit-proxy --version ${{ needs.release-please.outputs.version }}
            ```
            ## Docker Image
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release-please.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ```
            **Platforms:** linux/amd64, linux/arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [build-ci-container, e2e-smoke, release-please]
    if: needs.release-please.outputs.release_created == 'true'
    container:
      image: ${{ needs.build-ci-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Download tested release bundle artifact
        uses: actions/download-artifact@v7
        with:
          name: release-bundle
          path: dist

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to GHCR
        run: |
          helm push dist/apiservice-audit-proxy-*.tgz oci://${{ env.CHART_REGISTRY }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/apiservice-audit-proxy-*.tgz
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
