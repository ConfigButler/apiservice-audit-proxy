apiVersion: apps/v1
kind: Deployment
metadata:
  name: wardle-server
  namespace: wardle
spec:
  template:
    spec:
      containers:
        - name: wardle-server
          args:
            - --etcd-servers=http://localhost:2379
            - --client-ca-file=/etc/wardle/proxy-client-ca/ca.crt
            - --tls-cert-file=/etc/wardle/serving-cert/tls.crt
            - --tls-private-key-file=/etc/wardle/serving-cert/tls.key
          volumeMounts:
            - mountPath: /etc/wardle/proxy-client-ca
              name: proxy-client-ca
              readOnly: true
            - mountPath: /etc/wardle/serving-cert
              name: serving-cert
              readOnly: true
      volumes:
        - name: proxy-client-ca
          secret:
            secretName: audit-pass-through-backend-client-ca
        - name: serving-cert
          secret:
            secretName: audit-pass-through-backend-serving-cert
