apiVersion: v1
kind: Service
metadata:
  name: {{ include "audit-pass-through-apiserver.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "audit-pass-through-apiserver.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: api
      port: {{ .Values.service.port }}
      targetPort: api
      protocol: TCP
  selector:
    {{- include "audit-pass-through-apiserver.selectorLabels" . | nindent 4 }}

