{{- if eq (include "audit-pass-through-apiserver.certificateMode" .) "dev-self-signed" }}
{{- $secretName := include "audit-pass-through-apiserver.servingSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "audit-pass-through-apiserver.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ index $existing.data "tls.crt" }}
  tls.key: {{ index $existing.data "tls.key" }}
  {{- if hasKey $existing.data "ca.crt" }}
  ca.crt: {{ index $existing.data "ca.crt" }}
  {{- end }}
{{- else }}
{{- $dnsNames := list
      (include "audit-pass-through-apiserver.fullname" .)
      (printf "%s.%s" (include "audit-pass-through-apiserver.fullname" .) .Release.Namespace)
      (printf "%s.%s.svc" (include "audit-pass-through-apiserver.fullname" .) .Release.Namespace)
      (printf "%s.%s.svc.cluster.local" (include "audit-pass-through-apiserver.fullname" .) .Release.Namespace) -}}
{{- $ca := genCA (printf "%s-dev-ca" (include "audit-pass-through-apiserver.fullname" .)) 3650 -}}
{{- $cert := genSignedCert (include "audit-pass-through-apiserver.fullname" .) nil $dnsNames 3650 $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "audit-pass-through-apiserver.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  ca.crt: {{ $ca.Cert | b64enc }}
{{- end }}
{{- end }}
