{{- if and .Values.testApiserver.enabled .Values.testApiserver.backendServingCert.enabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "apiservice-audit-proxy.testApiserver.servingSelfSignedIssuerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apiservice-audit-proxy.testApiserver.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "apiservice-audit-proxy.testApiserver.servingCASecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apiservice-audit-proxy.testApiserver.labels" . | nindent 4 }}
spec:
  commonName: {{ include "apiservice-audit-proxy.testApiserver.servingCASecretName" . }}
  isCA: true
  issuerRef:
    kind: Issuer
    name: {{ include "apiservice-audit-proxy.testApiserver.servingSelfSignedIssuerName" . }}
  privateKey:
    algorithm: ECDSA
    rotationPolicy: Always
    size: 256
  secretName: {{ include "apiservice-audit-proxy.testApiserver.servingCASecretName" . }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "apiservice-audit-proxy.testApiserver.servingCAIssuerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apiservice-audit-proxy.testApiserver.labels" . | nindent 4 }}
spec:
  ca:
    secretName: {{ include "apiservice-audit-proxy.testApiserver.servingCASecretName" . }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "apiservice-audit-proxy.testApiserver.servingCertSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apiservice-audit-proxy.testApiserver.labels" . | nindent 4 }}
spec:
  dnsNames:
    {{- include "apiservice-audit-proxy.testApiserver.servingDNSNames" . | nindent 4 }}
  issuerRef:
    kind: Issuer
    name: {{ include "apiservice-audit-proxy.testApiserver.servingCAIssuerName" . }}
  privateKey:
    rotationPolicy: Always
  secretName: {{ include "apiservice-audit-proxy.testApiserver.servingCertSecretName" . }}
  usages:
    - digital signature
    - server auth
{{- end }}
