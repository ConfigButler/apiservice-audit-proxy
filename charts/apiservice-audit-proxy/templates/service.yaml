apiVersion: v1
kind: Service
metadata:
  name: {{ include "apiservice-audit-proxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apiservice-audit-proxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: api
      port: {{ .Values.service.port }}
      targetPort: api
      protocol: TCP
  selector:
    {{- include "apiservice-audit-proxy.selectorLabels" . | nindent 4 }}

