{{- if and .Values.webhookTester.enabled .Values.webhookTester.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "apiservice-audit-proxy.webhookTester.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apiservice-audit-proxy.webhookTester.labels" . | nindent 4 }}
  {{- with .Values.webhookTester.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.webhookTester.ingress.className }}
  ingressClassName: {{ .Values.webhookTester.ingress.className }}
  {{- end }}
  rules:
    - {{- if .Values.webhookTester.ingress.host }}
      host: {{ .Values.webhookTester.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "apiservice-audit-proxy.webhookTester.fullname" . }}
                port:
                  name: http
{{- end }}
