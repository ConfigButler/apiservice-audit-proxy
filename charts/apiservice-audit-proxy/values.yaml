replicaCount: 1

image:
  repository: ghcr.io/configbutler/apiservice-audit-proxy
  pullPolicy: IfNotPresent
  tag: 0.1.0

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

service:
  type: ClusterIP
  port: 443

listenAddress: ":9445"
containerPort: 9445

apiService:
  enabled: false
  annotations: {}
  caBundle: ""
  group: wardle.example.com
  groupPriorityMinimum: 1000
  insecureSkipTLSVerify: false
  name: v1alpha1.wardle.example.com
  version: v1alpha1
  versionPriority: 15

backend:
  url: "https://sample-apiserver.wardle.svc:443"
  insecureSkipVerify: true
  caSecretName: ""
  caFileName: ca.crt
  clientCertSecretName: ""
  clientCertFileName: tls.crt
  clientKeyFileName: tls.key
  serverName: ""

requestHeader:
  clientCASecretName: ""
  clientCAFileName: ca.crt

webhook:
  kubeconfigSecretName: audit-pass-through-webhook-kubeconfig
  kubeconfigKey: kubeconfig
  timeout: 5s

certificates:
  mode: dev-self-signed
  existingSecretName: ""
  devSelfSigned:
    secretName: ""
  certManager:
    certificateName: ""
    createSelfSignedIssuer: false
    duration: 2160h
    issuerRef:
      group: cert-manager.io
      kind: Issuer
      name: ""
    renewBefore: 360h
    secretName: ""
    selfSignedIssuerName: ""

audit:
  maxBodyBytes: 1048576
  captureTempDir: ""

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraArgs: []
env: []
volumes: []
volumeMounts: []
